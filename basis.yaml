governance:
  version: "1.0"

# Fulcrum's internal layering. Four linguistic layers, ordered by what may
# import what — and now enforced as Cargo crate boundaries, not module
# convention. A layer cannot import an upper layer because the crate does
# not depend on it; that is a Cargo.toml fact the compiler checks.
#
#   dictionary (crate fulcrum-dictionary): pure data types — the nouns. The
#               smallest possible foundation. Depends on std only; cannot
#               import any other fulcrum crate.
#
#   laboratory (crate fulcrum-laboratory): pure logic — the sealed Primitive
#               alphabet, the gauge family AND its evaluation, the move-kind
#               witnesses, power evaluation, and the `Safe<G, N>` typestate.
#               Depends on dictionary only. NB: gauge *declaration* and
#               *eval* live together here. Rust's orphan rule forbids
#               `impl Gauge for SumTopK` from a crate owning neither the
#               trait nor the type, so the old decl-in-dictionary /
#               eval-in-laboratory split cannot survive a crate boundary;
#               likewise the `pub(crate)` seal needs the Primitive trait and
#               its impls in one crate. The split made these module-only
#               idioms illegal — exactly the latent smell flagged earlier.
#
#   planners (crate fulcrum-planners): reference scheduler implementations.
#               Strictly above laboratory; consumes the move alphabet and
#               Safe<G, N>. Pure (no IO); randomness deterministically seeded.
#
#   hands (crate fulcrum-hands): IO-touching code. CSV parsing, replay
#               support, the cluster twin. May import anywhere. The only
#               layer permitted to do file_io.
#
# The `fulcrum` crate is now a pure umbrella: it re-exports all four layers
# (so `fulcrum::X` paths are stable) and hosts the examples and integration
# tests. The production shell that drives real hardware lives in its own
# crates (proto / agent / controller), not here.

layers:
  dictionary:
    role: "Data types — the nouns (crate fulcrum-dictionary)"
    packages:
      - "crates/fulcrum-dictionary/src/cluster.rs"
      - "crates/fulcrum-dictionary/src/load.rs"
      - "crates/fulcrum-dictionary/src/power.rs"
      - "crates/fulcrum-dictionary/src/trace.rs"
    rules:
      purity: strict
    depends_on: []

  laboratory:
    role: "Sealed alphabet, gauges + eval, move kinds, typestate, apply impls (crate fulcrum-laboratory)"
    packages:
      - "crates/fulcrum-laboratory/src/alphabet.rs"
      - "crates/fulcrum-laboratory/src/gauge.rs"
      - "crates/fulcrum-laboratory/src/gauge_eval.rs"
      - "crates/fulcrum-laboratory/src/move_kind.rs"
      - "crates/fulcrum-laboratory/src/power_eval.rs"
      - "crates/fulcrum-laboratory/src/safe.rs"
    rules:
      purity: strict
    depends_on: [dictionary]

  planners:
    role: "Reference scheduler implementations (crate fulcrum-planners)"
    packages:
      - "crates/fulcrum-planners/src/lib.rs"
      - "crates/fulcrum-planners/src/least_loaded.rs"
      - "crates/fulcrum-planners/src/power_of_two.rs"
      - "crates/fulcrum-planners/src/max_min_fair.rs"
      - "crates/fulcrum-planners/src/best_fit_decreasing.rs"
    rules:
      purity: strict
    depends_on: [dictionary, laboratory]

  hands:
    role: "IO, parsing, replay support, the cluster twin (crate fulcrum-hands)"
    packages:
      - "crates/fulcrum-hands/src/replay.rs"
      - "crates/fulcrum-hands/src/twin.rs"
    depends_on: [dictionary, laboratory, planners]

# Branded newtypes that must not be replaced with raw integers at API
# boundaries. The point: a function that takes `u64` could mean anything;
# a function that takes `Mass` cannot be passed a MachineId by accident.
newtypes:
  enabled: true
  exclude_params: [index, count, offset, len, threshold]
  exclude_functions: [len, default, is_empty, capacity, zero, is_zero]
  types:
    - name: Mass
      wraps: "[u64; N]"
      const_generic: N
    - name: Capacity
      wraps: "[u64; N]"
      const_generic: N
    - name: Utilization
      wraps: "[f64; N]"
      const_generic: N
    - name: MachineId
      wraps: u64
    - name: Power
      wraps: f64

# Discriminated unions that must be matched exhaustively. Rust `match` is
# already exhaustive unless a `_` wildcard arm absorbs new variants, so the
# operative effect of this rule is: **no `_` wildcard arms** on the listed
# unions — every match site must name each variant, so adding a variant is a
# compile error until every site is updated. (The variant lists below
# duplicate the Rust source and can drift; a future improvement is to derive
# them from source rather than restate them here.)
exhaustive_matching:
  enabled: true
  unions:
    - name: Effect
      variants:
        - MassDecreasing
        - PigouDalton
        - Permutation
        - MassIncreasing
        - MassPreservingFree
    - name: GaugeError
      variants:
        - ThresholdExceeded
        - UnknownMachine
        - InsufficientLoad
    - name: EventKind
      variants:
        - Schedule
        - Remove
    - name: MoveRecord
      variants:
        - Remove
        - HotToCold
        - Neutral
        - ColdToHot
        - Place
    - name: FleetError
      variants:
        - UnknownMachine
        - InsufficientLoad
    - name: TypedMove
      variants:
        - Remove
        - HotToCold
        - Neutral
        - ColdToHot
        - Place

# The dictionary and laboratory layers must be pure. The hands layer is
# allowed to do IO. tests/ and examples/ are not bound by these rules.
purity:
  enabled: true
  forbidden_in_strict:
    - file_io
    - network_io
    - stdout
    - stderr
    - env_vars
    - system_clock
    - subprocess
